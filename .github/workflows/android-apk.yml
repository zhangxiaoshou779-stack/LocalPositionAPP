name: Build Android APK

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: '17'

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradle execute permission
        run: |
          if [ -f ./gradlew ]; then chmod +x ./gradlew; fi

      - name: Build debug APK
        run: |
          if [ -f ./gradlew ]; then
            ./gradlew --no-daemon clean :app:assembleDebug
          else
            gradle --no-daemon clean :app:assembleDebug
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Job summary with download entry
        run: |
          echo "## APK Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "Artifact name: app-debug-apk-${GITHUB_SHA}" >> $GITHUB_STEP_SUMMARY
          echo "Go to this run's **Artifacts** section and click the artifact to download APK." >> $GITHUB_STEP_SUMMARY
